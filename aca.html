<style>

:root{
  --navy:#001c3d;--navy-mid:#002a5c;
  --gold:#F5A623;--gold-light:#FDF3E0;--gold-dark:#C47F0A;
  --white:#FFFFFF;--off-white:#F8F9FB;
  --text-primary:#0D1B2A;--text-secondary:#4A5568;--text-muted:#8FA3B8;
  --border:rgba(0,28,61,0.10);--border-soft:rgba(0,28,61,0.06);
  --teal:#1D9E75;--teal-light:#E1F5EE;
  --purple:#5B3FA6;--purple-light:#EDE9FA;--purple-dark:#3D2875;
  --font-display:'Playfair Display',Georgia,serif;
  --font-body:'Plus Jakarta Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-body);color:var(--text-primary);background:var(--white);overflow-x:hidden;line-height:1;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:64px;background:var(--navy);position:sticky;top:0;z-index:100;}
.nav-logo img{height:36px;width:auto;display:block;}
.nav-links{display:flex;align-items:center;gap:26px;}
.nav-link{font-size:13px;color:rgba(255,255,255,0.6);cursor:pointer;transition:color 0.2s;font-weight:400;text-decoration:none;}
.nav-link:hover{color:var(--white);}
.nav-link.active{color:var(--gold);}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-lang{font-size:12px;color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:5px 10px;cursor:pointer;transition:all 0.2s;}
.nav-lang:hover{background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.9);}
.nav-cta{font-family:var(--font-body);font-size:13px;font-weight:600;background:var(--gold);color:var(--navy);border:none;border-radius:8px;padding:9px 20px;cursor:pointer;transition:all 0.2s;text-decoration:none;}
.nav-cta:hover{background:#e8960f;}
.breadcrumb{padding:14px 48px;background:var(--off-white);border-bottom:1px solid var(--border-soft);}
.bc-inner{display:flex;align-items:center;gap:8px;font-size:12px;}
.bc-link{color:var(--text-muted);text-decoration:none;}
.bc-link:hover{color:var(--navy);}
.bc-sep{color:var(--text-muted);}
.bc-current{color:var(--navy);font-weight:500;}
.footer{padding:32px 48px;background:var(--navy);display:flex;align-items:flex-start;justify-content:space-between;gap:32px;}
.footer-logo img{height:28px;width:auto;display:block;margin-bottom:10px;}
.footer-copy{font-size:12px;color:rgba(255,255,255,0.3);line-height:1.6;max-width:440px;}
.footer-links{display:flex;gap:20px;margin-bottom:8px;}
.footer-link{font-size:12px;color:rgba(255,255,255,0.4);cursor:pointer;text-decoration:none;}
.footer-link:hover{color:rgba(255,255,255,0.8);}


.hero{position:relative;overflow:hidden;padding:90px 48px 80px;background:linear-gradient(160deg,#0d3d27 0%,#146b42 55%,#1a8050 100%);}
.hero-bg{position:absolute;inset:0;background-image:radial-gradient(circle at 80% 20%,rgba(245,166,35,0.08) 0%,transparent 50%),radial-gradient(circle at 10% 80%,rgba(255,255,255,0.03) 0%,transparent 40%);pointer-events:none;}
.hero-inner{position:relative;z-index:2;max-width:700px;}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(245,166,35,0.15);border:1px solid rgba(245,166,35,0.3);border-radius:20px;padding:6px 14px;margin-bottom:28px;}
.hero-badge-dot{width:7px;height:7px;background:var(--gold);border-radius:50%;}
.hero-badge-text{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--gold);}
.hero-title{font-family:var(--font-display);font-size:52px;font-weight:700;line-height:1.07;letter-spacing:-0.02em;color:var(--white);margin-bottom:22px;}
.hero-title .accent{color:var(--gold);font-style:italic;}
.hero-sub{font-size:16px;color:rgba(255,255,255,0.7);line-height:1.7;max-width:540px;margin-bottom:36px;font-weight:300;}
.hero-sub strong{color:var(nt-weight:300;}
.hero-sub strong{color:var(--white);font-weight:600;}
.hero-actions{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:48px;}
.btn-primary{font-family:var(--font-body);font-size:15px;font-weight:700;background:var(--gold);color:var(--navy);border:none;border-radius:10px;padding:15px 32px;cursor:pointer;transition:all 0.2s;text-decoration:none;display:inline-flex;align-items:center;gap:8px;}
.btn-primary:hover{background:#e8960f;transform:translateY(-1px);box-shadow:0 8px 24px rgba(245,166,35,0.35);}
.btn-secondary{font-family:var(--font-body);font-size:15px;font-weight:500;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.85);border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:15px 28px;cursor:pointer;transition:all 0.2s;text-decoration:none;}
.btn-secondary:hover{background:rgba(255,255,255,0.15);}
.hero-stats{display:flex;gap:36px;flex-wrap:wrap;}
.h-stat-num{font-family:var(--font-display);font-size:28px;font-weight:700;color:var(--gold);}
.h-stat-label{font-size:12px;color:rgba(255,255,255,0.45);font-weight:300;margin-top:2px;}
.section{padding:80px 48px;}
.section-label{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--teal);margin-bottom:12px;}
.section-title{font-family:var(--font-display);font-size:40px;font-weight:700;line-height:1.12;color:var(--navy);margin-bottom:16px;letter-spacing:-0.01em;}
.section-sub{font-size:16px;color:var(--text-secondary);line-height:1.7;max-width:560px;font-weight:300;margin-bottom:48px;}
.tiers-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:48px;}
.tier-card{border-radius:18px;padding:28px 22px;border:2px solid transparent;transition:all 0.3s;text-align:center;}
.tier-card:hover{transform:translateY(-4px);}
.tier-bronze{background:linear-gradient(145deg,#FDF0E6,#FADDBC);border-color:rgba(180,90,30,0.2);}
.tier-silver{background:linear-gradient(145deg,#F2F2F4,#E2E4EC);border-color:rgba(100,100,130,0.2);}
.tier-gold{background:linear-gradient(145deg,#FDFAE6,#F7F0BC);border-color:rgba(180,155,30,0.25);}
.tier-platinum{background:linear-gradient(145deg,#E8E8F8,#D5D5F0);border-color:rgba(80,60,160,0.2);}
.tier-icon{font-size:32px;margin-bottom:12px;}
.tier-name{font-family:var(--font-display);font-size:22px;font-weight:700;margin-bottom:6px;}
.tier-bronze .tier-name{color:#8B4513;}
.tier-silver .tier-name{color:#4a4a6a;}
.tier-gold .tier-name{color:#8a6010;}
.tier-platinum .tier-name{color:#3C3489;}
.tier-desc{font-size:13px;line-height:1.6;font-weight:300;margin-bottom:16px;color:var(--text-secondary);}
.tier-key{font-size:12px;font-weight:600;margin-bottom:4px;color:var(--navy);}
.tier-val{font-family:var(--font-display);font-size:26px;font-weight:700;}
.tier-bronze .tier-val{color:#8B4513;}
.tier-silver .tier-val{color:#4a4a6a;}
.tier-gold .tier-val{color:#8a6010;}
.tier-platinum .tier-val{color:#3C3489;}
.subsidy-section{padding:80px 48px;background:var(--off-white);}
.subsidy-box{max-width:700px;margin:48px auto 0;background:var(--white);border:1px solid var(--border);border-radius:24px;overflow:hidden;}
.subsidy-top{background:linear-gradient(135deg,#0d3d27,#1a8050);padding:28px 36px;}
.subsidy-top-title{font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--white);margin-bottom:6px;}
.subsidy-top-sub{font-size:13px;color:rgba(255,255,255,0.6);font-weight:300;}
.subsidy-body{padding:32px 36px;}
.s-label{font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:8px;display:block;}
.s-input{width:100%;border:1px solid var(--border);border-radius:10px;padding:11px 16px;font-family:var(--font-body);font-size:15px;color:var(--text-primary);outline:none;transition:border-color 0.2s;background:var(--off-white);}
.s-input:focus{border-color:var(--teal);background:var(--white);}
.s-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
.s-result{background:var(--teal-light);border:1px solid rgba(29,158,117,0.2);border-radius:14px;padding:20px 24px;margin-top:20px;display:flex;align-items:center;justify-content:space-between;}
.s-result-text{font-size:13px;color:var(--teal);font-weight:600;}
.s-result-amount{font-family:var(--font-display);font-size:32px;font-weight:700;color:var(--teal);}
.s-cta{width:100%;margin-top:16px;font-family:var(--font-body);font-size:15px;font-weight:700;background:#146b42;color:var(--white);border:none;border-radius:10px;padding:14px;cursor:pointer;text-decoration:none;display:block;text-align:center;}
.s-cta:hover{background:#0d3d27;}
.enroll-section{padding:80px 48px;}
.enroll-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;max-width:960px;margin:48px auto 0;}
